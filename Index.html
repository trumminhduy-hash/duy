<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thwih Music</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>
<div class="logo">
<i class="fa-solid fa-bars"></i>
<span>Thwih</span>
</div>

<div class="right">
<i class="fa-regular fa-bell"></i>
<i class="fa-solid fa-gear"></i>
</div>
</header>

<div class="container">

<div class="card">
<i class="fab fa-tiktok"></i>
<div>
<h3>Theo dõi TikTok</h3>
<p>@thwih1</p>
</div>
<i class="fa-solid fa-chevron-right"></i>
</div>

<div class="card">
<i class="fab fa-telegram"></i>
<div>
<h3>Telegram</h3>
<p>@thwihmusic</p>
</div>
<i class="fa-solid fa-chevron-right"></i>
</div>

<h2>Lấy Nhạc</h2>

<div class="card">
<i class="fa-solid fa-music"></i>

<div>
<h3>Get Music 2026</h3>
<p>Tải miễn phí</p>
</div>

<span class="tag">Google Docs</span>
</div>

<div class="card">
<i class="fa-solid fa-headphones"></i>

<div>
<h3>Thư viện nhạc</h3>
<p>Không giới hạn</p>
</div>

<span class="tag">Danh sách</span>
</div>

<h2>Tìm kiếm</h2>

<input
type="text"
placeholder="Nhập tên bài hát..."
id="search">

<div id="songs">

</div>

</div>

<script src="script.js"></script>

</body>
</html>
